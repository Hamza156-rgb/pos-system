services:
  db:
    image: mysql:8.0
    container_name: pos_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-pos_db}
      MYSQL_USER: ${DB_USER:-pos_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pos_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "3399:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: pos_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-pos_db}
      DB_USER: ${DB_USER:-pos_user}
      DB_PASSWORD: ${DB_PASSWORD:-pos_password}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_access_secret_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_in_production}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CORS_ORIGIN: http://localhost:5173
      AUTO_SEED: "true"
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: pos_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
